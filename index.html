<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
  <h1 class="start-title">TIC TAC TOE</h1>
  <p class="subtitle">Web Based Game</p>
  <button class="start-btn" onclick="startGame()">▶ START GAME</button>
</div>

<div class="container" id="gameContainer">
  <h1 class="title">TIC TAC TOE</h1>

  <div class="scoreboard">
    <div>X Win: <span id="xScore">0</span></div>
    <div>Draw: <span id="drawScore">0</span></div>
    <div>O Win: <span id="oScore">0</span></div>
  </div>

  <div class="mode-buttons">
    <button class="player-btn" onclick="setMode('player')">🎮 1 VS 1</button>
    <button class="bot-btn" onclick="setMode('bot')">🤖 VS BOT</button>
  </div>

  <div class="status-box"><h2 id="status">Pilih Mode Permainan</h2></div>

  <div class="board">
    <div class="cell" onclick="handleClick(0)"></div>
    <div class="cell" onclick="handleClick(1)"></div>
    <div class="cell" onclick="handleClick(2)"></div>
    <div class="cell" onclick="handleClick(3)"></div>
    <div class="cell" onclick="handleClick(4)"></div>
    <div class="cell" onclick="handleClick(5)"></div>
    <div class="cell" onclick="handleClick(6)"></div>
    <div class="cell" onclick="handleClick(7)"></div>
    <div class="cell" onclick="handleClick(8)"></div>
    <div id="winning-line"></div>
  </div>

  <button class="reset-btn" onclick="resetGame()">🔄 Reset Game</button>
</div>

<div id="winnerPopup" class="popup">
  <div class="popup-content">
    <h2 id="winnerText"></h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
